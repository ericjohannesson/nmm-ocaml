<code class="code"><span class="keyword">let</span> string_of_t_doc_class (doc_class : t_doc_class) : string =
        <span class="keyword">match</span> doc_class <span class="keyword">with</span>
        <span class="keywordsign">|</span><span class="constructor">DOC_CHS</span> <span class="keywordsign">-&gt;</span> <span class="string">"doc chs"</span>

        <span class="keywordsign">|</span><span class="constructor">DOC_PARS</span> <span class="keywordsign">-&gt;</span> <span class="string">"doc pars"</span>
        <span class="keywordsign">|</span><span class="constructor">DOC_BLKS</span> <span class="keywordsign">-&gt;</span> <span class="string">"doc blks"</span></code></body></html>
