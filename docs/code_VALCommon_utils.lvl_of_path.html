<code class="code"><span class="keyword">let</span> <span class="keyword">rec</span> lvl_of_path (path : t_path) : int =
        <span class="keyword">match</span> path <span class="keyword">with</span>
        <span class="keywordsign">|</span> [] <span class="keywordsign">-&gt;</span> 0
        <span class="keywordsign">|</span> hd :: tl <span class="keywordsign">-&gt;</span>
                <span class="keyword">match</span> hd <span class="keyword">with</span>
                <span class="keywordsign">|</span> <span class="constructor">ITM_NODE</span> _ <span class="keywordsign">-&gt;</span> lvl_of_path tl + 1
                <span class="keywordsign">|</span> <span class="constructor">BLT_NODE</span> <span class="keywordsign">-&gt;</span> lvl_of_path tl + 1
                <span class="keywordsign">|</span> _ <span class="keywordsign">-&gt;</span> lvl_of_path tl</code></body></html>
