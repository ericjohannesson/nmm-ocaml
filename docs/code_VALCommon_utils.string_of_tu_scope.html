<code class="code"><span class="keyword">let</span> string_of_tu_scope (scope : tu_scope) : string =
        <span class="keyword">match</span> scope <span class="keyword">with</span>
        <span class="keywordsign">|</span><span class="constructor">Cu_scope_gbl</span> <span class="keywordsign">-&gt;</span> <span class="string">"GBL"</span>

        <span class="keywordsign">|</span><span class="constructor">Cu_scope_sec</span> <span class="keywordsign">-&gt;</span> <span class="string">"SEC"</span>
        <span class="keywordsign">|</span><span class="constructor">Cu_scope_app</span> <span class="keywordsign">-&gt;</span> <span class="string">"APP"</span>
        <span class="keywordsign">|</span><span class="constructor">Cu_scope_par</span> <span class="keywordsign">-&gt;</span> <span class="string">"PAR"</span></code></body></html>
