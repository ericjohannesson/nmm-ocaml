<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstract with notes</title>

<style>

html {
    font-family : monospace;
    font-size   : medium;
    line-height : 150%;
    max-width   : 80ch;
    margin      : auto;
}

em {
    font-style      : normal;
    text-decoration : underline;
}

a {
    text-decoration : none;
}

p, pre {
    margin-top    : 0;
    margin-bottom : 0;
}


h2, h3, h4, h5 {
    margin-top : 0;
}


/************* TITLE ********************/

.title {
    font-weight   : normal;
    font-size     : x-large;
    margin-bottom : 1rem;
    line-height   : 130%;
}

.doc.pars .title {
    margin-left : 3.00rem;
}

.doc.secs .title {
    margin-left : 3.00rem;
}

.doc.chs .title {
    font-size : xx-large;
}


/************ AUTHORS *******************/


.authors {
    font-size     : medium;
    margin-top    : 2rem;
    margin-bottom : 1rem;
}

.author + .author {
    margin-top : 1rem;
}

.doc.pars .authors {
    margin-left : 3.00rem;
}

.doc.secs .authors {
    margin-left : 3.00rem;
}

/************ DATE ******************/

.date {
    font-size : small;
}

.doc.pars .date {
    margin-left : 3.00rem;
}

.doc.secs .date {
    margin-left : 3.00rem;
}

/************ ABSTRACT ******************/

.abstract {
    margin-bottom : 3rem;
}

* + .abstract {
    margin-top : 2rem;
}

.doc.pars .abstract {
    margin-left : 3.00rem;
}

.doc.secs .abstract {
    margin-left : 3.00rem;
}

.abstract_hdr {
    font-weight   : normal;
    font-size     : large;
    margin-bottom : 0.5rem;
}


/************* REFS *********************/

.refs {
    margin-top : 3rem;
}

.doc.pars .refs {
    margin-left : 3.00rem;
}

.doc.secs .refs {
    margin-left : 3.00rem;
}

.doc.chs .refs {
    margin-top  : 0;
    padding-top : 3rem;
    border-top  : thin solid;
}

.refs_hdr {
    font-weight : normal;
    font-size   : large;
}

.doc.chs .refs_hdr {
    font-size : x-large;
    margin-bottom : 3rem;
}


/************* DOC_MAIN *****************/

* + .doc_main {
    margin-top : 2rem;
}

/************** CH **********************/

.ch {
    padding-top    : 3rem;
    padding-bottom : 3rem;
    border-top     : solid;
}

.ch_lbl {
    font-weight : normal;
    font-size   : x-large;
}

.ch_hdr {
    font-size   : x-large;
    line-height : 130%;
}

.ch_hdr, .ch_lbl.hdr {
    margin-bottom : 3rem;
}

.ch_lbl + .ch_hdr {
    margin-top : 1rem;
}


/************** SEC *********************/

.sec + .sec {
    margin-top : 3rem;
}

.sec_lbl {
    float       : left;
    font-size   : large;
    font-weight : normal;
    line-height : 130%;
}

.sec_hdr {
    margin-left : 3.00rem;
    font-size   : large;
    line-height : 130%;
}

.sec.pars > .sec_lbl.hdr {
    float : none;
}

/************** PAR *********************/

.par + .par {
    margin-top : 2rem;
}

.par_lbl {
    float       : left;
    font-weight : normal;
    font-size   : inherit;
}

.par_tag, .par_hdr {
    font-weight  : bold;
    display      : inline;
    font-size    : inherit;
}


.par_tag + .par_hdr::before {
    content : " (";
}

.par_tag + .par_hdr::after {
    content : ")";
}

.par_main {
    margin-left : 3.00rem;
}


/************** BLK *********************/

.par_hdr + p.blk.txt {
    display : inline;
}

.par_tag.hdr + p.blk.txt {
    display : inline;
}

.par_hdr + p.blk.txt::before {
    content : "  ";
}

.par_tag.hdr + p.blk.txt::before {
    content : "  ";
}

* + .blk {
    margin-top : 1rem;
}

.sec_main > .blk {
    margin-left : 3.00rem;
}

.blk.txt {
    hyphens     : auto;
    white-space : pre-wrap;
}


.blk_blt_lbl {
    float : left;
}

.blk_blt_main {
    margin-left : 6ch;
}


.blk_itm_lbl {
    float : left;
}

.blk_itm_main {
    margin-left : 6ch;
}


.dsp_line_lbl {
    float : left;
}

.dsp_line_main {
    margin-left : 6ch;
    white-space : pre;
}

.blk.qtn {
    hyphens     : auto;
    white-space : pre-wrap;
    margin-left : 6ch;
}

/******** ENDNOTES/FOOTNOTES ************/

.doc_endnotes_hdr, .ch_endnotes_hdr, .sec_endnotes_hdr, .par_endnotes_hdr, .abstract_endnotes_hdr, .refs_endnotes_hdr {
    font-weight : normal;
}

.doc_endnotes, .ch_endnotes, .sec_endnotes, .par_endnotes, .abstract_endnotes, .refs_endnotes {
    margin-top  : 2rem;
    border-top  : thin solid;
    padding-top : 0.5rem;
}

.sec_endnotes, .par_endnotes {
    margin-left : 3.00rem;
}

.blk_nte_lbl {
    float : left;
}

.blk_nte_main {
    margin-left : 6ch;
}

/*************** BIB ********************/


.bib_custom .blk_itm_lbl {
    float : none;
}



/*************** PRINTING ***************/

@media print {

  html {
    font-size : 13px;
  }

  h1, h2, h3, h4, h5, .ch_lbl, .sec_lbl, .par_lbl, .par_tag, .blk_itm_lbl, .blk_blt_lbl, .clear {
    break-after  : avoid-page;
    break-inside : avoid-page;
  }


  .ch_main, .sec_main, .par_main, .blk_itm_main, .blk_blt_main {
    break-before : avoid-page;
  }


  .blk.dsp {
    break-inside : avoid-page;
  }


  .ch {
    break-before : page;
    border       : none;
  }


  .doc.chs .refs {
    break-before : page;
    border       : none;
  }


  @page {
    size          : a4;
    margin-top    : 20mm;
    margin-left   : 20mm;
    margin-right  : 20mm;
    margin-bottom : 30mm;

    @top-center {
       content : " ";
    }

    @bottom-center {
      padding : 10mm;
      content : counter(page) "/" counter(pages);
    }
  }
}

</style>
</head>
<body>
<main class="doc pars">
<h1 class="title">Abstract with notes</h1>
<section class="abstract">
<h2 class="abstract_hdr">ABSTRACT</h2>
<p class="blk txt">This is an abstract<a class="txt_unit_nte" href="#NTE_note_in_abstract_0" id="ref_NTE_note_in_abstract_0">¹</a> with a note.</p>
<footer class="abstract_endnotes">
<div class="blk nte" id="NTE_note_in_abstract_0"><a class="blk_nte_lbl" href="#ref_NTE_note_in_abstract_0">¹</a><div class="clear"></div><div class="blk_nte_main">
<p class="blk txt">Content of note in abstract.</p>
</div></div>
</footer>
</section>
<div class="doc_main">
<section class="par">
<h2 class="par_lbl hdr">¶ 1</h2>
<div class="clear"></div>
<div class="par_main">
<p class="blk txt">This is document has an abstract containing a note. So does its first paragraph.<a class="txt_unit_nte" href="#NTE_par_1" id="ref_NTE_par_1">¹</a></p>
</div>
<footer class="par_endnotes">
<div class="blk nte" id="NTE_par_1"><a class="blk_nte_lbl" href="#ref_NTE_par_1">¹</a><div class="clear"></div><div class="blk_nte_main">
<p class="blk txt">Content of note in paragraph.</p>
</div></div>
</footer>
</section>
</div>
<section class="refs">
<h2 class="refs_hdr">REFERENCES</h2>
<p class="blk txt">A reference list with a note.<a class="txt_unit_nte" href="#NTE_refs_2" id="ref_NTE_refs_2">¹</a></p>
<footer class="refs_endnotes">
<div class="blk nte" id="NTE_refs_2"><a class="blk_nte_lbl" href="#ref_NTE_refs_2">¹</a><div class="clear"></div><div class="blk_nte_main">
<p class="blk txt">Content of note in refs.</p>
</div></div>
</footer>
</section>
</main>
</body>
</html>
